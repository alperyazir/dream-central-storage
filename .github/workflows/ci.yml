name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Admin Panel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin-panel

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/admin-panel/package-lock.json

      - run: npm ci

      - name: Lint
        run: npx eslint "src/**/*.{ts,tsx}"

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npx vitest --run

      - name: Build
        run: npm run build

  backend:
    name: API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint
        run: |
          pip install ruff
          ruff check .

      - name: Test
        run: pytest --maxfail=3 --disable-warnings -q
